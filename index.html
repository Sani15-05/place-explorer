<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Explorer | Discover Amazing Destinations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo-icon">🌍</span>
                    <span class="logo-text">Place Explorer</span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link active" data-category="all">All Places</a>
                <a href="#" class="nav-link" data-category="beach">🏖️ Beaches</a>
                <a href="#" class="nav-link" data-category="mountain">⛰️ Mountains</a>
                <a href="#" class="nav-link" data-category="city">🌆 Cities</a>
                <a href="#" class="nav-link" data-category="historical">🏛️ Historical</a>
            </div>
        </nav>

        <!-- Hero Section -->
        <header class="hero">
            <h1>Discover Your Next Adventure</h1>
            <p>Explore breathtaking destinations around the world</p>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search for a place...">
                <button id="searchBtn">🔍 Search</button>
            </div>
        </header>

        <!-- Stats Section -->
        <div class="stats-section">
            <div class="stat-box">
                <div class="stat-number" id="totalPlaces">0</div>
                <div class="stat-label">Destinations</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="exploredCount">0</div>
                <div class="stat-label">Explored</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="avgRating">0.0</div>
                <div class="stat-label">Avg Rating</div>
            </div>
        </div>

        <!-- Places Grid -->
        <div class="places-container">
            <div class="places-grid" id="placesGrid">
                <!-- Dynamic place cards will appear here -->
            </div>
        </div>

        <!-- Place Details Modal -->
        <div id="placeModal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
